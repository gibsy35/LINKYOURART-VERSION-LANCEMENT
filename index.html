<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkYourArt | Institutional Asset Portal</title>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en', 
          includedLanguages: 'en,fr',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      /* Hide the default Google Translate bar */
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      body { top: 0px !important; }
      .goog-te-gadget { font-family: inherit !important; }
      .goog-te-gadget-simple {
        background-color: transparent !important;
        border: none !important;
        padding: 0 !important;
        display: flex !important;
        align-items: center !important;
      }
      .goog-te-gadget-simple img { display: none !important; }
      .goog-te-menu-value { color: inherit !important; margin: 0 !important; }
      .goog-te-menu-value span { border-left: none !important; }
      #google_translate_element { 
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        pointer-events: none;
        z-index: -1;
      }
      /* Ensure the dropdown menu itself is visible when triggered */
      .goog-te-menu-frame {
        box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        border-radius: 4px !important;
      }
      .goog-te-menu2 {
        background-color: #1a1a1a !important;
        border: none !important;
        color: #fff !important;
      }
      .goog-te-menu2-item div, .goog-te-menu2-item:link div, .goog-te-menu2-item:visited div, .goog-te-menu2-item:active div {
        color: #fff !important;
        background-color: transparent !important;
      }
      .goog-te-menu2-item:hover div {
        background-color: rgba(0,255,255,0.1) !important;
      }
      .goog-te-gadget span { display: none !important; }
      .goog-te-gadget { color: transparent !important; }
      .goog-te-gadget .goog-te-combo { color: #fff !important; background: #1a1a1a !important; border: 1px solid #333 !important; padding: 4px !important; border-radius: 4px !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
